name: CI/CD Pipeline to AWS ECS

on:
  push:
    branches:
      - main  # Se ejecuta automáticamente al hacer push a la rama principal

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio en la máquina virtual de GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Configurar las credenciales de AWS usando la región us-east-1
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    # 3. Iniciar sesión de forma segura en Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Construir y subir la imagen Docker a tu repositorio de ECR
    - name: Build, Tag, and Push Image to ECR
      # ⚠️ SI TU DOCKERFILE ESTÁ DENTRO DE UNA CARPETA (ej: frontend), borra el '#' de abajo y pon su nombre:
      # working-directory: ./nombre-de-tu-carpeta
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: tu-repositorio-ecr-front  # 👈 CAMBIA ESTO por el nombre real de tu repositorio en ECR
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 5. Actualizar el servicio en el clúster de ECS para aplicar los cambios en la EC2
    - name: Deploy to Amazon ECS
      run: |
        aws ecs update-service --cluster solenme-cluster --service task-front-despacho-service --force-new-deployment --region us-east-1
