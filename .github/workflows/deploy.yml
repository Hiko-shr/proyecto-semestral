name: CI/CD Pipeline to AWS ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to ECR
      # Mantenemos la ruta de trabajo que demostró compilar con éxito
      working-directory: ./back-Ventas_SpringBoot/Springboot-API-REST
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        # 👇 CORREGIDO: Usamos el nombre exacto de tu captura de AWS
        ECR_REPOSITORY: back-ventas
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Deploy to Amazon ECS
      run: |
        # 👇 REVISA: Asegúrate de que el servicio en tu cluster de ECS se llame así para Ventas
        aws ecs update-service --cluster solenme-cluster --service service-back-ventas --force-new-deployment --region us-east-1
