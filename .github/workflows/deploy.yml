name: CI/CD Pipeline to AWS ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to ECR
      # Entramos a la carpeta donde está tu código real
      working-directory: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: back-despachos-repo # <-- Nombre corregido para que coincida con AWS
        IMAGE_TAG: latest
      run: |
        # Construimos y subimos la imagen usando el Dockerfile correcto
        docker build -f ../Springboot-API-REST/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Deploy to Amazon ECS
      run: |
        # Nombres de cluster y servicio corregidos para que coincidan con la infraestructura creada
        aws ecs update-service --cluster innova-cluster --service back-despachos-service --force-new-deployment --region us-east-1
